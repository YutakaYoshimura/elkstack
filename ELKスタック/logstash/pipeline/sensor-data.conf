input {
  file {
    path => "/data/sensor_data.csv"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb/your-app.sincedb"
    # 毎回最初から読みたい場合は下記を使用
    # sincedb_path => "/dev/null"
  }
}

filter {
  # ヘッダ行をスキップ
  if [message] =~ /^timestamp,/ {
    drop {}
  }

  csv {
    separator => ","
    columns => ["timestamp", "device_id", "device_name",
                 "vibration", "temperature", "current",
                 "pressure", "flow_rate"]
  }

  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss", "ISO8601"]
    target => "@timestamp"
    timezone => "Asia/Tokyo"
  }
  
  # ここを追加：JSTの年月フィールドを生成
  ruby {
    code => "event.set('index_ym', event.get('@timestamp').time.localtime('+09:00').strftime('%Y.%m'))"
  }
  
  mutate {
    convert => {
      "vibration"   => "float"
      "temperature" => "float"
      "current"     => "float"
      "pressure"    => "float"
      "flow_rate"   => "float"
    }
    remove_field => ["message", "host", "path", "timestamp", "event", "log", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    # ここを修正：%{+YYYY.MM} → %{index_ym}
    index => "sensor-data-%{index_ym}"
  }
  stdout {
    codec => dots
  }
}
